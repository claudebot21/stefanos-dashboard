name: Update Dashboard Data

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ master, main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch GitHub Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install GitHub CLI
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh jq -y
          
          # Authenticate
          echo "$GH_TOKEN" | gh auth login --with-token
          
          # Get repo count for claudebot21
          REPO_COUNT=$(gh repo list claudebot21 --limit 1000 --json name | jq length)
          echo "REPO_COUNT=$REPO_COUNT" >> $GITHUB_ENV
          
          # Get recent events for dekolor
          gh api users/dekolor/events --jq '.[:10] | map({type: .type, repo: .repo.name, date: .created_at})' > activity.json
          
          # Get event count
          EVENTS=$(gh api users/dekolor/events --jq 'length')
          echo "EVENTS=$EVENTS" >> $GITHUB_ENV
          
          # Get PR count
          PRS=$(gh search prs --author dekolor --state open --json number | jq length)
          echo "PRS=$PRS" >> $GITHUB_ENV
          
          # Create dashboard data file
          cat > dashboard-data.json << EOF
          {
            "repos": $REPO_COUNT,
            "events": $EVENTS,
            "openPRs": $PRS,
            "updated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF
          
      - name: Commit Data Files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add activity.json dashboard-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update dashboard data [$(date -u +"%Y-%m-%d %H:%M UTC")]"
          git push
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
